<!-- templates/register.html -->
{% extends "base.html" %}
{% block title %}Register - NeuroScan AI{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7" data-aos="fade-up">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                            <h3>Create Account</h3>
                            <p class="text-muted">Register to use the brain tumor detection tool</p>
                        </div>
                        
                        <form action="{{ url_for('register') }}" method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-1"></i> Username
                                </label>
                                <input type="text" class="form-control form-control-lg" id="username" name="username" required placeholder="Choose a username">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope me-1"></i> Email
                                </label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="Enter your email">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock me-1"></i> Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Min. 6 characters">
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">
                                    <i class="fas fa-lock me-1"></i> Confirm Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill mb-3">
                                <i class="fas fa-user-plus me-2"></i> Register
                            </button>
                        </form>
                        
                        <div class="text-center">
                            <p class="text-muted">Already have an account? 
                                <a href="{{ url_for('login') }}" class="text-primary fw-bold">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
